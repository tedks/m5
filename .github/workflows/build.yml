name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: companion
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quotawatch-debug
          path: companion/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/app/build/outputs/apk/debug/app-debug.apk

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('firmware/platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -d firmware

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: quotawatch-firmware
          path: firmware/.pio/build/m5stickc-plus/firmware.bin

      - name: Attach firmware to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/.pio/build/m5stickc-plus/firmware.bin
