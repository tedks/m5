id: m5-7ph
title: "hasSession() treats any cookie as login \u2014 Cloudflare cookies count"
desc: UsageScraper.hasSession returns true if ANY cookie exists for the origin (__cf_bm
  etc.), so Settings shows 'Logged in' after real session expiry and scrapes burn
  45s before failing. Consider persisting last scrape outcome per service to drive
  UI status.
