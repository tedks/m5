id: m5-7mt
title: Fix framework0 USB enumeration for M5
desc: 'The M5StickC Plus fails to enumerate on framework0 (USB error -110 timeouts
  on device descriptor reads). Works fine on tower0. Tried:

  - Different cables (including included A-to-C cable)

  - USB autosuspend disable

  - Different ports


  Likely a Realtek USB hub issue in the Framework expansion card system. Would be
  nice to flash directly from the dev machine instead of going through tower0.'
