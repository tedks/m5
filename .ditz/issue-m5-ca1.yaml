id: m5-ca1
title: Fragile evaluateJavascript result unescaping duplicated in scrapers
desc: Chained .replace() unescaping of the JSON-encoded JS string is order-sensitive
  and wrong for edge cases; duplicated in ClaudeScraper+CodexScraper. Decode with
  JSONTokener in UsageScraper instead. fix/scraper-robustness.
