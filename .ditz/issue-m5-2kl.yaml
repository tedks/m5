id: m5-2kl
title: 'bd sync commit fails: fork protection excludes .beads/issues.jsonl in own
  repo'
desc: 'bd 0.42.0 rewrites .git/info/exclude with ''.beads/issues.jsonl'' (fork protection)
  on every sync even though origin is tedks/m5 (canonical, not a fork), so bd sync''s
  git-add step always errors. Workaround: git add -f .beads/issues.jsonl + manual
  commit. Investigate why bd thinks this is a fork (ZFC import artifact?) or upgrade
  bd.'
