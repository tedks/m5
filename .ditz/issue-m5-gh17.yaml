id: m5-gh17
title: M5 gets no data on BLE connect until manual Refresh
desc: 'mirrors gh-17. After the app connects to the M5, the watch shows nothing until
  Refresh is tapped in the app.


  Cause: QuotaRepository.doRefresh() sends the BLE payload only when the state is
  already Connected at refresh time; a connection established between refreshes never
  receives the current snapshot.


  Fix: observe bleClient.state in QuotaRepository; on transition to Connected with
  a non-empty snapshot, immediately push the current quota snapshot over BLE.'
type: bugfix
component: default
