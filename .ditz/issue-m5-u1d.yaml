title: "Re-add tolerant Codex 5h parsing \u2014 OpenAI's removal of the 5-hour limit
  is temporary"
desc: "PR #11 deleted Codex 5h extraction because the usage page had no such section.
  Web research (2026-07-17): OpenAI temporarily removed the 5-hour limit for Plus/Pro/Business
  on 2026-07-13, so the section will likely return. Re-add a label-anchored '5 hour
  usage limit ... N% remaining' parse that emits 'Codex 5h' when present and silently
  skips when absent (no error, no unlabeled fallback, settle predicate unchanged \u2014
  weekly presence still gates settling). Refs: help.openai.com/en/articles/20001106-codex-rate-card,
  bleepingcomputer.com/news/artificial-intelligence/openai-temporarily-relaxes-gpt-56-sol-usage-limits/"
