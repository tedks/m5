title: Handle Claude OAuth token refresh
desc: "The OAuth access token from ~/.claude/.credentials.json expires (expiresAt
  field). The app should detect expiry and either:\n- Prompt the user to paste a new
  token\n- Use the refresh token to get a new access token (risky \u2014 can conflict
  with Claude Code's own refresh cycle)\n- Show a clear 'token expired' error\n\nCurrently
  the token just silently fails when expired."
