title: Auto-refresh stops when app unfocused; no background refresh mechanism
desc: 'Auto-refresh is a viewModelScope while(true)/delay loop: frozen by the Android
  12+ cached-app freezer when backgrounded, killed with the process, plus background
  WebView renderers are paused so scrapes time out (45s) and produce Errors. Fix across
  fix/lifecycle-refresh (lifecycle gating) + feat/foreground-service (connectedDevice
  foreground service owning refresh+BLE, renderer priority policy).'
