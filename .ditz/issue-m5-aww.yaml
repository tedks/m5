id: m5-aww
title: "QuotaFetcher retains Activity context in ViewModel \u2014 Activity leak"
desc: QuotaViewModel.setActivityContext stores Activity-context-backed QuotaFetcher
  in a field that outlives the Activity (rotation leak). Activity context is empirically
  required for WebView rendering (046ec8c) so use a lifecycle-safe holder, not a plain
  field. fix/lifecycle-refresh.
