id: m5-exy
title: "Scraper cookies never flushed \u2014 session rotation lost on process death"
desc: 'CookieManager.flush() only runs in the login WebView (MainActivity onPageFinished).
  claude.ai/chatgpt.com rotate session tokens during scrapes; rotated cookies stay
  in RAM and die with the process, randomly logging out one service. Fix: flush after
  every scrape in UsageScraper. Also clearSession() is dead code using setCookie(url,
  "") which is a no-op. Fixed by PR stack: fix/cookie-persistence.'
